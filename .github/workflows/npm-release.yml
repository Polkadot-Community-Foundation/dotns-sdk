name: NPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.2)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # When dispatched automatically from release.yml, the release assets
      # may not be available yet (GitHub processes uploads asynchronously).
      # Retry up to 5 times with 15s delay to handle this race condition.
      - name: Download CLI tarball from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p packs
          for i in 1 2 3 4 5; do
            gh release download "${{ inputs.tag }}" \
              --pattern "*.tgz" \
              --dir packs \
              --repo "${{ github.repository }}" && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          ls -ltr packs

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packs

      # PCF publishes under @polkadot-community-foundation via its own isolated publisher
      # (Polkadot-Community-Foundation/npm-publish-automation), NOT paritytech's private
      # npm_publish_automation (which PCF cannot dispatch to). The CLI is named
      # @polkadot-community-foundation/dotns-cli in-tree, so the packed tarball is already correctly
      # scoped and matches that repo's publishable-packages.json allowlist. The npm token lives
      # only in the automation repo. Dispatch is inlined (not the automation repo's composite
      # action) to avoid resolving an action from a PRIVATE cross-repo (org private-action sharing
      # is plan-gated); uses only the public create-github-app-token + a gh api call.
      - name: Mint App token (dispatch scope)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PUBLISH_APP_ID }}
          private-key: ${{ secrets.PUBLISH_APP_PRIVATE_KEY }}
          owner: Polkadot-Community-Foundation
          repositories: npm-publish-automation

      - name: Dispatch PCF npm-publish-automation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          printf '{"ref":"main","inputs":{"repo":"%s","run_id":"%s","artifact_name":"packages"}}' \
            "${{ github.repository }}" "${{ github.run_id }}" \
          | gh api -X POST \
              /repos/Polkadot-Community-Foundation/npm-publish-automation/actions/workflows/publish.yml/dispatches \
              --input -
