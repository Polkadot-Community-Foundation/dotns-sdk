name: Request Code Owner Review

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-review:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - name: Request review from code owners
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Request review from the org maintainers team (see .github/CODEOWNERS).
            // Wrapped so a missing team / non-collaborator never fails the check.
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                team_reviewers: ["maintainers"],
              });
            } catch (error) {
              core.warning(`Could not request code owner review: ${error.message}`);
            }
