name: Add to Project

on:
  pull_request:
    types: [opened]

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add to Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        continue-on-error: true
        with:
          # TODO(PCF): set the real Polkadot-Community-Foundation project board number.
          # Harmless until then (continue-on-error); also needs the PROJECT_TOKEN secret.
          project-url: https://github.com/orgs/Polkadot-Community-Foundation/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
